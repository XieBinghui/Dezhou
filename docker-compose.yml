version: "3.9"
services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - WEB_ORIGIN=http://localhost:5173,http://localhost:8080,http://152.136.121.48
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgres://dezhou:dezhou@postgres:5432/dezhou
      - SESSION_SECRET=replace-with-strong-secret
      - RATE_LIMIT_WINDOW_MS=10000
      - RATE_LIMIT_MAX=120
      - RATE_LIMIT_SOCKET_WINDOW_MS=10000
      - RATE_LIMIT_SOCKET_MAX=80
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: dezhou
      POSTGRES_PASSWORD: dezhou
      POSTGRES_DB: dezhou
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dezhou -d dezhou"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
